<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juridic - Triagem Estratégica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .risk-Alto { color: #dc3545; font-weight: bold; }
        .risk-Médio { color: #ffc107; font-weight: bold; }
        .risk-Baixo { color: #198754; font-weight: bold; }
        .card-result { display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center mb-4">
                <h1 class="display-5 fw-bold">Juridic</h1>
                <p class="lead">Análise Jurídica com Inteligência Artificial</p>
            </div>
            
            <div class="col-md-6">
                <div class="input-group mb-3 shadow-sm">
                    <input type="number" id="processoId" class="form-control" placeholder="Digite o ID do Processo (ex: 1)">
                    <button class="btn btn-primary" type="button" onclick="analisar()">Analisar Caso</button>
                </div>
                
                <div id="loading" class="text-center my-3" style="display: none;">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p>A IA está processando a melhor estratégia...</p>
                </div>

                <div id="resultCard" class="card card-result shadow border-0">
                    <div class="card-header bg-dark text-white">
                        Estratégia Gerada pelo Gemini 2.5
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-6">
                                <h6>Risco do Caso:</h6>
                                <span id="resRisco"></span>
                            </div>
                            <div class="col-6 text-end">
                                <h6>Proposta Sugerida:</h6>
                                <span class="badge bg-success fs-6" id="resValor"></span>
                            </div>
                        </div>
                        <hr>
                        <h5>Justificativa Estratégica:</h5>
                        <p id="resJustificativa" class="text-muted"></p>
                        <h5>Argumento de Negociação:</h5>
                        <div class="p-3 bg-light rounded italic" id="resArgumento"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function analisar() {
            const id = document.getElementById('processoId').value;
            const loading = document.getElementById('loading');
            const card = document.getElementById('resultCard');
            
            if (!id) return alert("Por favor, digite um ID.");

            loading.style.display = 'block';
            card.style.display = 'none';

            try {
                // chamada para o backend
                const response = await fetch(`http://localhost:8000/triagem/${id}`);
                const data = await response.json();

                if (response.status !== 200) throw new Error(data.detail);

                const analise = data.analise;
                document.getElementById('resRisco').innerText = analise.risco;
                document.getElementById('resRisco').className = `risk-${analise.risco}`;
                document.getElementById('resValor').innerText = `R$ ${analise.valor_sugerido.toLocaleString('pt-BR')}`;
                document.getElementById('resJustificativa').innerText = analise.justificativa;
                document.getElementById('resArgumento').innerText = analise.argumento; // TODO: fazer no backend

                card.style.display = 'block';
            } catch (error) {
                alert("Erro ao buscar dados: " + error.message);
            } finally {
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
